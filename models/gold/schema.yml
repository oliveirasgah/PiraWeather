version: 2

models:
  - name: daily_summary
    description: >
      Daily aggregation of silver.weather_data. Min/max/avg/sum per variable
      plus obs_count for QA. Foundation for all other gold marts.
    columns:
      - name: obs_date
        description: Calendar date in America/Sao_Paulo (the source zone).
        tests:
          - not_null
          - unique
      - name: obs_count
        description: Number of sub-hourly silver rows aggregated for this day.
        tests:
          - not_null

  - name: daily_climatology
    description: >
      30-year normals per day-of-year. For each tracked variable:
      mean, p10, p50, p90. n_years flags under-sampled DOYs (e.g. Feb 29).
    columns:
      - name: doy
        description: Day-of-year (1..366).
        tests:
          - not_null
          - unique
      - name: n_years
        description: Distinct years contributing to this DOY's percentiles.
        tests:
          - not_null

  - name: extreme_events
    description: >
      Top-10 records per category for dashboard headlines. Categories cover
      both daily aggregations (hottest/coldest/wettest day, driest month)
      and sub-daily silver records (wettest/windiest hour).
    columns:
      - name: category
        description: Event category.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - hottest_day
                  - coldest_day
                  - wettest_day
                  - wettest_hour
                  - windiest_hour
                  - driest_month
      - name: rank
        description: 1..10 within category, 1 being most extreme.
        tests:
          - not_null
      - name: event_at
        description: Event timestamp (date for dailies, hour for sub-daily, month-start for monthly).
        tests:
          - not_null
      - name: value
        description: Event value in the units indicated by `unit`.
      - name: unit
        description: Unit of `value` ('C', 'mm', 'm/s').
        tests:
          - not_null

  - name: growing_degree_days
    description: >
      Daily Growing Degree Days per crop, plus a year-cumulative window sum.
      Heat accumulation by crop drives phenology models in agronomy.
    columns:
      - name: obs_date
        tests:
          - not_null
      - name: crop
        description: Crop reference from seeds.crop_base_temperatures.
        tests:
          - not_null
      - name: base_temp_c
        description: Base temperature below which the crop accumulates no GDD.
        tests:
          - not_null
      - name: gdd_daily
        description: GREATEST((Tmax + Tmin)/2 - base_temp_c, 0).
      - name: gdd_cumulative_year
        description: Running sum of gdd_daily within the calendar year per crop.

  - name: reference_et
    description: >
      FAO-56 Penman-Monteith reference evapotranspiration (ET0) plus the
      daily and 30-day rolling water balance. Inputs assume wind at 2 m and
      grass reference crop. Pre-Era-3 days are NULL because they lack Rn.
    columns:
      - name: obs_date
        tests:
          - not_null
          - unique
      - name: et0_mm_day
        description: FAO-56 ET0 in mm/day. NULL for Era 1 / Era 2 (no Rn).
      - name: precip_mm
        description: Daily rainfall in mm.
      - name: water_balance_mm
        description: precip_mm - et0_mm_day. Positive = surplus, negative = deficit.
      - name: water_balance_30d_mm
        description: 30-day rolling sum of water_balance_mm.
      - name: inputs_complete
        description: false when Patm fallback (94 kPa) was used; flags Era 1 / Era 2 days.
        tests:
          - not_null

  - name: drought_index
    description: >
      Z-score variant of SPI over 1/3/6/12-month windows. Z is computed
      against the historical mean/std of the same trailing window for the
      same calendar-month-end across all years. Not a true gamma-fit SPI.
    columns:
      - name: obs_month
        description: First day of the month.
        tests:
          - not_null
      - name: window_months
        description: Trailing window length in months.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 3, 6, 12]
      - name: z_score
        description: (window_sum - hist_mean) / hist_std for that window+month-of-year.
      - name: category
        description: SPI-like classification derived from z_score thresholds.
        tests:
          - accepted_values:
              arguments:
                values:
                  - extreme drought
                  - severe drought
                  - moderate drought
                  - near normal
                  - moderately wet
                  - severely wet
                  - extremely wet
